name: Automated Tests

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: Branch
        required: true
        default: main
        type: choice
        options:
          - main
          - develop
          - staging
      TAGS:
        description: Tags
        required: true
        type: string
        options:
          - "@accessPermissions"
          - "@accessGroupManagement"
  workflow_call:
    inputs:
      BRANCH:
        required: false
        default: main
        type: string
      TAGS:
        required: true
        type: string

jobs:
  Automated-Tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.BRANCH }}

      - name: Installing dependencies
        run: npm ci

      - name: Show loaded inputs
        run: |
          echo "Branch: ${{ inputs.BRANCH }}"
          echo "Tags: ${{ inputs.TAGS }}"

      - name: Acceptance Test
        run: |
          set -o pipefail
          TAGS="${{ inputs.TAGS }}"
          if [ -n "$TAGS" ]; then
            npm run cy:run -- --env TAGS="$TAGS" 2>&1 | tee test-output.txt
          else
            npm run cy:run 2>&1 | tee test-output.txt
          fi

      - name: Consolidar contagem de testes
        if: always()
        shell: bash
        run: |
          get_metric_from_box() {
            local label="$1"
            local value
            value=$(grep -Eo "│ ${label}:[[:space:]]+[0-9]+" test-output.txt | tail -1 | grep -Eo "[0-9]+" || true)
            echo "${value}"
          }

          passing=$(get_metric_from_box "Passing")
          failing=$(get_metric_from_box "Failing")
          pending=$(get_metric_from_box "Pending")
          skipped=$(get_metric_from_box "Skipped")
          tests=$(get_metric_from_box "Tests")

          # Fallback para execucoes interrompidas antes do sumario final.
          if [ -z "$passing" ]; then
            passing=$(grep -Ec '^\s*√\s' test-output.txt || true)
          fi
          if [ -z "$failing" ]; then
            failing=$(grep -Ec '^\s*[0-9]+\)\s' test-output.txt || true)
          fi
          if [ -z "$pending" ]; then
            pending=0
          fi
          if [ -z "$skipped" ]; then
            skipped=0
          fi
          if [ -z "$tests" ]; then
            tests=$((passing + failing + pending + skipped))
          fi

          if grep -q "ECONNRESET" test-output.txt; then
            run_note="Execucao interrompida por erro de conexao (ECONNRESET)."
          else
            run_note="Execucao concluida sem erro de conexao."
          fi

          {
            echo '# Automated Test Summary'
            echo ''
            echo '| Metrica | Valor |'
            echo '|---|---:|'
            echo "| Tests | ${tests} |"
            echo "| Passing | ${passing} |"
            echo "| Failing | ${failing} |"
            echo "| Pending | ${pending} |"
            echo "| Skipped | ${skipped} |"
            echo ''
            echo "- ${run_note}"
          } >> "$GITHUB_STEP_SUMMARY"
