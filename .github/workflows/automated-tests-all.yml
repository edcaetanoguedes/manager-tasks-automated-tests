name: Automated Tests (All)

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: Branch da aplicação
        required: true
        default: main
        type: choice
        options:
          - main
          - develop
          - staging
      TAGS:
        description: Tags
        required: true
        type: string
  workflow_call:
    inputs:
      BRANCH:
        description: Branch da aplicação
        required: false
        default: main
        type: string
      TAGS:
        description: Tags
        required: true
        type: string
    secrets: # permissões necessárias
      GH_MANAGER_TASKS_TESTS_TOKEN: # secret que contém o token que dá/limita permissões
        required: true # torna obrigatório

jobs:
  Automated-Tests:
    runs-on: ubuntu-latest

    steps:
      - name: Show loaded inputs
        run: |
          echo "Application branch: ${{ inputs.BRANCH }}"
          echo "Tags: ${{ inputs.TAGS }}"

      - name: Clonar repositório (backend)
        uses: actions/checkout@v4
        with:
          repository: edcaetanoguedes/manager-tasks-backend # Ambos os repos deve estar na mesma conta/organização
          # Token da conta com permissões
          token: ${{ secrets.GH_MANAGER_TASKS_TESTS_TOKEN }}
          # Define uma pasta com nome onde o repo será clonado
          # Bom pra quando se lida com mais de um projeto (ex: frontend, backend)
          path: manager-tasks-backend
          # Define qual branch/tag será clonada
          ref: ${{ inputs.BRANCH }}

      - name: Instalar dependências (backend)
        working-directory: manager-tasks-backend # Seta a pasta definida em path
        run: npm ci

      - name: Iniciar aplicação na porta 4000 (backend)
        working-directory: manager-tasks-backend
        run: |
          npm start > backend.log 2>&1 &

      - name: Esperar a aplicação estar disponível (backend)
        working-directory: manager-tasks-backend # Seta a pasta definida em path
        run: npx wait-on http://localhost:4000

        #

      - name: Clonar repositório (Frontend)
        uses: actions/checkout@v4
        with:
          repository: edcaetanoguedes/manager-tasks-frontend
          token: ${{ secrets.GH_MANAGER_TASKS_TESTS_TOKEN }}
          path: manager-tasks-frontend
          ref: ${{ inputs.BRANCH }}

      - name: Instalar dependências (frontend)
        working-directory: manager-tasks-frontend # Seta a pasta definida em path
        run: npm ci

      - name: Iniciar aplicação na porta 3000 (frontend)
        working-directory: manager-tasks-frontend
        run: |
          npm run dev > frontend.log 2>&1 &

      - name: Esperar a aplicação estar disponível (frontend)
        working-directory: manager-tasks-frontend # Seta a pasta definida em path
        run: npx wait-on http://localhost:3000

        #

      - name: Checkout (Automated Tests)
        uses: actions/checkout@v4
        with:
          repository: edcaetanoguedes/manager-tasks-automated-tests
          path: manager-tasks-automated-tests
          ref: main

      - name: Installing dependencies
        working-directory: manager-tasks-automated-tests
        run: npm ci

      - name: Acceptance Test
        working-directory: manager-tasks-automated-tests
        run: |
          set -o pipefail
          TAGS="${{ inputs.TAGS }}"
          if [ -n "$TAGS" ]; then
            npm run cy:run -- --env TAGS="$TAGS" 2>&1 | tee test-output.txt
          else
            npm run cy:run 2>&1 | tee test-output.txt
          fi

      - name: Carregar métricas
        working-directory: manager-tasks-automated-tests
        if: always()
        shell: bash
        run: |
          {
          echo '# Automated Test Summary'
          echo ''
          echo '| Metrica | Valor |'
          echo '|---|---:|'
          echo "| Tests | $(jq '.totalTests' reports/report.json) |"
          echo "| Passing | $(jq '.totalPassed' reports/report.json) |"
          echo "| Failing | $(jq '.totalFailed' reports/report.json) |"
          echo "| Pending | $(jq '.totalPending' reports/report.json) |"
          echo "| Skipped | $(jq '.totalSkipped' reports/report.json) |"
          echo ''
          echo "- ${run_note}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Backend Logs
        if: always()
        working-directory: manager-tasks-backend
        run: tail -200 backend.log

      - name: Frontend Logs
        if: always()
        working-directory: manager-tasks-frontend
        run: tail -200 frontend.log
